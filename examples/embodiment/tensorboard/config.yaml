env:
  train:
    env_type: realworld
    total_num_envs: 1
    auto_reset: true
    ignore_terminations: false
    reward_mode: raw
    wrap_obs_mode: simple
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: false
    max_steps_per_rollout_epoch: 100
    max_episode_steps: 500
    use_spacemouse: false
    keyboard_reward_wrapper: single_stage
    main_image_key: observation.images.front
    no_gripper: false
    use_pose_wrappers: false
    video_cfg:
      save_video: false
      info_on_video: true
      video_base_dir: /video/train
    init_params:
      id: RosRobotEnv-v1
      num_envs: null
    override_cfg:
      is_dummy: false
      state_dim: 14
      action_dim: 16
      step_frequency: 10.0
      max_num_steps: 100
      image_shape:
      - 224
      - 224
      - 3
      joint_names:
      - right_joint_1.pos
      - right_joint_2.pos
      - right_joint_3.pos
      - right_joint_4.pos
      - right_joint_5.pos
      - right_joint_6.pos
      - right_joint_7.pos
      - left_joint_1.pos
      - left_joint_2.pos
      - left_joint_3.pos
      - left_joint_4.pos
      - left_joint_5.pos
      - left_joint_6.pos
      - left_joint_7.pos
      action_scale:
      - 0.01
      - 0.05
      - 1.0
      adapter_cls: rlinf.envs.realworld.ros_robot.ros2_jointstate_adapter.Ros2JointStateAdapter
      qos_history_depth: 10
      state_topic: /fairino/joint_states
      command_topic: /fairino/joint_cmd
      gripper_command_topic: /fairino/gripper_cmd
      camera_keys:
      - observation.images.front
      - observation.images.left
      - observation.images.right
      image_topics:
        observation.images.front: /fairino/camera/front/image_raw
        observation.images.left: /fairino/camera/left/image_raw
        observation.images.right: /fairino/camera/right/image_raw
  eval:
    env_type: realworld
    total_num_envs: 1
    auto_reset: true
    ignore_terminations: false
    reward_mode: raw
    wrap_obs_mode: simple
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: false
    max_steps_per_rollout_epoch: 100
    max_episode_steps: 500
    use_spacemouse: false
    keyboard_reward_wrapper: single_stage
    main_image_key: observation.images.front
    no_gripper: false
    use_pose_wrappers: false
    video_cfg:
      save_video: false
      info_on_video: true
      video_base_dir: /video/train
    init_params:
      id: RosRobotEnv-v1
      num_envs: null
    override_cfg:
      is_dummy: false
      state_dim: 14
      action_dim: 16
      step_frequency: 10.0
      max_num_steps: 100
      image_shape:
      - 224
      - 224
      - 3
      joint_names:
      - right_joint_1.pos
      - right_joint_2.pos
      - right_joint_3.pos
      - right_joint_4.pos
      - right_joint_5.pos
      - right_joint_6.pos
      - right_joint_7.pos
      - left_joint_1.pos
      - left_joint_2.pos
      - left_joint_3.pos
      - left_joint_4.pos
      - left_joint_5.pos
      - left_joint_6.pos
      - left_joint_7.pos
      action_scale:
      - 0.01
      - 0.05
      - 1.0
      adapter_cls: rlinf.envs.realworld.ros_robot.ros2_jointstate_adapter.Ros2JointStateAdapter
      qos_history_depth: 10
      state_topic: /fairino/joint_states
      command_topic: /fairino/joint_cmd
      gripper_command_topic: /fairino/gripper_cmd
      camera_keys:
      - observation.images.front
      - observation.images.left
      - observation.images.right
      image_topics:
        observation.images.front: /fairino/camera/front/image_raw
        observation.images.left: /fairino/camera/left/image_raw
        observation.images.right: /fairino/camera/right/image_raw
  group_name: EnvGroup
actor:
  model:
    model_type: smolvla
    model_path: /home/jack/hyf/lerobot/smolvla_outputs03062026pick_up_long/1318-20000steps/checkpoints/020000/pretrained_model
    use_lerobot_checkpoint: true
    lerobot_src_path: null
    main_image_key: observation.images.front
    freeze_vision_encoder: null
    train_expert_only: true
    train_state_proj: null
    use_dsrl: true
    dsrl_state_dim: 14
    dsrl_action_noise_dim: 32
    dsrl_num_q_heads: 10
    dsrl_image_latent_dim: 64
    dsrl_state_latent_dim: 64
    dsrl_hidden_dims:
    - 128
    - 128
    - 128
    policy_setup: panda-smolvla
    image_size:
    - 3
    - 224
    - 224
    state_dim: 14
    action_dim: 16
    num_action_chunks: 50
    hidden_dim: 512
    precision: fp32
    add_value_head: false
    min_std: 0.0001
    max_std: 10.0
    is_lora: false
    lora_rank: 32
  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_orig_params: true
    use_liger_kernel: false
    fsdp_size: -1
    mixed_precision:
      param_dtype: fp32
      reduce_dtype: fp32
      buffer_dtype: fp32
    amp:
      enabled: false
      precision: bf16
      use_grad_scaler: false
  group_name: ActorGroup
  training_backend: fsdp
  micro_batch_size: 4
  global_batch_size: 8
  seed: 42
  enable_offload: false
  optim:
    lr: 0.0001
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5
  critic_optim:
    lr: 0.0003
    clip_grad: 10.0
    lr_scheduler: torch_constant
cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 1-1
    rollout: 1-1
runner:
  task_type: embodied
  logger:
    log_path: ''
    project_name: rlinf
    experiment_name: realworld_ros_robot_dsrl_smolvla
    logger_backends:
    - tensorboard
  max_epochs: 10
  max_steps: -1
  only_eval: false
  val_check_interval: -1
  save_interval: -1
  per_worker_log: false
  per_worker_log_path: null
  weight_sync_interval: 1
algorithm:
  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 50
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: token-mean
  group_size: 1
  agg_q: mean
  actor_agg_q: mean
  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    target_entropy: -16
    optim:
      lr: 0.0003
      lr_scheduler: torch_constant
      clip_grad: 10.0
  replay_buffer:
    enable_cache: true
    cache_size: 200
    sample_window_size: 200
    min_buffer_size: 2
    auto_save: false
  target_update_freq: 1
  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1
rollout:
  group_name: RolloutGroup
  backend: huggingface
  enable_offload: false
  pipeline_stage_num: 1
  collect_transitions: true
  collect_prev_infos: false
  model:
    model_path: /home/jack/hyf/lerobot/smolvla_outputs03062026pick_up_long/1318-20000steps/checkpoints/020000/pretrained_model
    precision: fp32
reward:
  use_reward_model: false
critic:
  use_critic_model: false
