defaults:
  - env/realworld_ros_robot@env.train
  - env/realworld_ros_robot@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld_ros_robot_dsrl_openpi_pi05"
    logger_backends: ["tensorboard"]
  max_epochs: 10
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: -1

algorithm:
  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 50
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  group_size: 1
  agg_q: mean
  actor_agg_q: mean
  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    target_entropy: -16
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0
  replay_buffer:
    enable_cache: True
    cache_size: 200
    sample_window_size: 200
    min_buffer_size: 2
    auto_save: False
  target_update_freq: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    override_cfg:
      is_dummy: True
      state_dim: 14
      action_dim: 16
      camera_keys: ["observation.images.front", "observation.images.left", "observation.images.right"]
      adapter_cls: "rlinf.envs.realworld.ros_robot.ros2_jointstate_adapter.Ros2JointStateAdapter"
      state_topic: "/io_teleop/joint_states"
      command_topic: "/policy/joint_cmd"
      gripper_command_topic: "/policy/target_gripper_status"
      image_topics:
        observation.images.front: "/camera/front/image_raw"
        observation.images.left: "/camera/left/image_raw"
        observation.images.right: "/camera/right/image_raw"
  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: True
      state_dim: 14
      action_dim: 16
      camera_keys: ["observation.images.front", "observation.images.left", "observation.images.right"]
      adapter_cls: "rlinf.envs.realworld.ros_robot.ros2_jointstate_adapter.Ros2JointStateAdapter"
      state_topic: "/io_teleop/joint_states"
      command_topic: "/policy/joint_cmd"
      gripper_command_topic: "/policy/target_gripper_status"
      image_topics:
        observation.images.front: "/camera/front/image_raw"
        observation.images.left: "/camera/left/image_raw"
        observation.images.right: "/camera/right/image_raw"

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False
  model:
    model_path: "/home/edmund/Desktop/RLinf/checkpoints/torch/pi05_pick_up_adapted"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 8
  seed: 42
  enable_offload: False
  model:
    model_path: "/home/edmund/Desktop/RLinf/checkpoints/torch/pi05_pick_up_adapted"
    action_dim: 16
    num_action_chunks: 10
    add_q_head: True
    openpi:
      config_name: "pi05_libero"
      use_dsrl: True
      dsrl_state_dim: 14
      dsrl_action_noise_dim: 32
      dsrl_num_q_heads: 10
      dsrl_image_latent_dim: 64
      dsrl_state_latent_dim: 64
      dsrl_hidden_dims: [128, 128, 128]
      train_expert_only: True
      detach_critic_input: True
      noise_method: "reinflow"
  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5
  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
