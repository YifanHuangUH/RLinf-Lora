defaults:
  - env/realworld_fairino@env.train
  - env/realworld_fairino@env.eval
  - model/smolvla@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 1-1
    rollout: 1-1

runner:
  task_type: embodied
  logger:
    log_path: "/workspace/examples/results"
    project_name: rlinf
    experiment_name: "realworld_ros_robot_dsrl_smolvla_0402_1548_2026"
    logger_backends: ["tensorboard"]
  max_epochs: 200    #Global step 10
  max_steps: -1
  only_eval: False
  val_check_interval: 10 #-1
  save_interval: 20 ##

algorithm:
  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 50
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  group_size: 1
  agg_q: mean
  actor_agg_q: mean
  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    target_entropy: -16
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0
  replay_buffer:
    enable_cache: True
    cache_size: 200
    sample_window_size: 200
    min_buffer_size: 2
    auto_save: False
  target_update_freq: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    max_episode_steps: 50
    auto_reset: True
    enable_offload: False
    ignore_terminations: False
    use_fixed_reset_state_ids: False
    max_steps_per_rollout_epoch: 50 
  eval:
    total_num_envs: 1
    max_episode_steps: 50
    auto_reset: True
    ignore_terminations: True #False
    use_fixed_reset_state_ids: True
    max_steps_per_rollout_epoch: 50 

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  # enable_cuda_graph: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False
  model:
    model_path: "/workspace/checkpoints/torch/smolvla_pickup/checkpoints/last/pretrained_model"  # Set to your SmolVLA checkpoint path
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 8
  seed: 42
  enable_offload: False
  model:
    model_type: "smolvla"
    model_path: "/workspace/checkpoints/torch/smolvla_pickup/checkpoints/last/pretrained_model"  # Set to your SmolVLA checkpoint path
    use_lerobot_checkpoint: True
    main_image_key: "observation.images.front"
    action_dim: 16
    state_dim: 14
    num_action_chunks: 50
    # precision: "bf16"
    precision: "fp32"
    add_value_head: False
    use_dsrl: True
    dsrl_state_dim: 14
    dsrl_action_noise_dim: 32
    dsrl_num_q_heads: 10
    dsrl_image_latent_dim: 64
    dsrl_state_latent_dim: 64
    dsrl_hidden_dims: [128, 128, 128]
    freeze_vision_encoder: null
    train_expert_only: True
    is_lora: True
    lora_rank: 32
    lora_path: null

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5
  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
