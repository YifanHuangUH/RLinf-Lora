defaults:
  - env/realworld_fairino@env.train
  - env/realworld_fairino@env.eval
  - model/smolvla@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

# ── Two-node cloud-edge setup ──────────────────────────────────────────
# Node 0 (cloud/workstation with GPU): actor + rollout
# Node 1 (edge machine with Fairino robot): env workers
#
# Startup procedure:
#   Cloud (node 0):
#     export RLINF_NODE_RANK=0
#     ray start --head --port=6379 --node-ip-address=<CLOUD_IP>
#
#   Robot edge (node 1):
#     export RLINF_NODE_RANK=1
#     ray start --address=<CLOUD_IP>:6379
#
#   Then on the cloud node only:
#     python examples/embodiment/train_embodied_agent.py \
#       --config-name realworld_ros_robot_dsrl_smolvla_2node
cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: cloud
      placement: 0-1        # Use both GPUs (GPU 0 and GPU 1) on cloud node
    rollout:
      node_group: cloud
      placement: 0-0        # Rollout inference on GPU 0
    env:
      node_group: robot
      placement: 0-0

  node_groups:
    - label: cloud
      node_ranks: "0"
      env_configs:
        - node_ranks: "0"
          env_vars:
            - MUJOCO_GL: "egl"
            - GLOO_SOCKET_IFNAME: "ens20f0"  # 添加网络接口配置
            - NCCL_SOCKET_IFNAME: "ens20f0"

    - label: robot
      node_ranks: "1"
      hardware:
        type: RosRobot
        configs:
          - robot_model: fairino
            namespace: "/fairino"
            node_rank: 1
      env_configs:
        - node_ranks: "1"
          # Point to the Docker venv for SmolVLA (or system python on bare-metal)
          python_interpreter_path: /opt/venv/smolvla/bin/python3
          env_vars:
            - ROS_DOMAIN_ID: "70"
            - GLOO_SOCKET_IFNAME: "wlx6c1ff7b29ef1"  # WiFi接口
            - NCCL_SOCKET_IFNAME: "wlx6c1ff7b29ef1"

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "realworld_ros_robot_dsrl_smolvla_2node"
    logger_backends: ["tensorboard"]
  max_epochs: 10
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: -1

algorithm:
  rollout_epoch: 1
  eval_rollout_epoch: 1
  update_epoch: 20
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  group_size: 1
  agg_q: mean
  actor_agg_q: mean
  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    target_entropy: -16
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0
  replay_buffer:
    enable_cache: True
    cache_size: 100
    sample_window_size: 100
    min_buffer_size: 2
    auto_save: False
  target_update_freq: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    max_episode_steps: 20
    # max_steps_per_rollout_epoch: 50
  eval:
    total_num_envs: 1
    max_episode_steps: 20
  # Disable keyboard/spacemouse wrappers for headless deployment
  use_spacemouse: False
  keyboard_reward_wrapper: null
  # Enable terminal-based human reward input (works without X11)
  use_terminal_reward_wrapper: true

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False
  model:
    model_path: "/workspace/checkpoints/torch/smolvla_pickup/checkpoints/last/pretrained_model"  # TODO: set to your actual checkpoint path
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 2       # Reduced from 8 to avoid OOM on 4090 (24GB)
  global_batch_size: 4      # 2 GPUs x micro_batch_size 2
  seed: 42
  enable_offload: False
  model:
    model_type: "smolvla"
    model_path: "/workspace/checkpoints/torch/smolvla_pickup/checkpoints/last/pretrained_model"  # TODO: set to your actual checkpoint path
    use_lerobot_checkpoint: True
    main_image_key: "observation.images.front"
    action_dim: 16
    state_dim: 14
    num_action_chunks: 10
    precision: "bf16"
    # precision: "fp32"
    add_value_head: False
    use_dsrl: True
    dsrl_state_dim: 14
    dsrl_action_noise_dim: 32
    dsrl_num_q_heads: 10
    dsrl_image_latent_dim: 64
    dsrl_state_latent_dim: 64
    dsrl_hidden_dims: [128, 128, 128]
    freeze_vision_encoder: null
    train_expert_only: True
    is_lora: False
    lora_rank: 32
  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5
  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"   # Shard across 2x 4090 to halve VRAM usage
    use_orig_params: True
    gradient_checkpointing: True        # Save VRAM by recomputing activations
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
