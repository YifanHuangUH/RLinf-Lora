env_type: maniskill

# total_num_envs: null
total_num_envs: 8

wrap_obs_mode: simple
use_full_state: False
auto_reset: True #False
ignore_terminations: False
use_rel_reward: False
reward_mode: raw
seed: 42 #0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 100 #50
max_episode_steps: 100 # max episode steps for truncation 50

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/test  #/train

enable_offload: False

init_params:
  id: "PickCube-v1"
  num_envs: null # will be set in ManiSkillEnv init
  obs_mode: "state"  # "state" “rgb”
  control_mode: arm_pd_ee_delta_pose_align_interpolate_by_planner #None
  sim_backend: "gpu"
  sim_config:
    sim_freq: 100
    control_freq: 20
  max_episode_steps: ${env.train.max_episode_steps} # max episode steps for truncation
  sensor_configs:
    shader_pack: "default"
  render_mode: all
